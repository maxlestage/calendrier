name: iOS build check

# Compiles the native SwiftUI app WITHOUT code signing — no Apple account or
# secrets needed. Catches Swift compile errors on every push, so the app is
# verified without a Mac and without a full TestFlight run.

on:
  push:
    paths:
      - "ios/**"
      - ".github/workflows/ios-build-check.yml"
  pull_request:
    paths:
      - "ios/**"
      - ".github/workflows/ios-build-check.yml"
  workflow_dispatch: {}

jobs:
  build:
    name: Compile (no signing)
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer 2>/dev/null \
            || sudo xcode-select -s "$(ls -d /Applications/Xcode_16*.app | sort -V | tail -1)/Contents/Developer"
          xcodebuild -version

      - name: Build for simulator (no code signing)
        run: |
          set -o pipefail
          xcodebuild build \
            -project ios/Calendrier.xcodeproj \
            -scheme Calendrier \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO
