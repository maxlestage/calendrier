name: TestFlight

on:
  push:
    branches: [master]
    paths:
      - "ios/**"
      - ".github/workflows/testflight.yml"
  workflow_dispatch: {}

concurrency:
  group: testflight
  cancel-in-progress: false

jobs:
  build-and-upload:
    name: Archive, sign and upload to TestFlight
    runs-on: macos-15
    timeout-minutes: 45
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
      APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
    steps:
      - name: Check required secrets
        run: |
          missing=""
          [ -z "${{ secrets.APPLE_TEAM_ID }}" ] && missing="$missing APPLE_TEAM_ID"
          [ -z "${{ secrets.APPSTORE_KEY_ID }}" ] && missing="$missing APPSTORE_KEY_ID"
          [ -z "${{ secrets.APPSTORE_ISSUER_ID }}" ] && missing="$missing APPSTORE_ISSUER_ID"
          [ -z "${{ secrets.APPSTORE_P8 }}" ] && missing="$missing APPSTORE_P8"
          [ -z "${{ secrets.DIST_CERT_BASE64 }}" ] && missing="$missing DIST_CERT_BASE64"
          [ -z "${{ secrets.DIST_CERT_PASSWORD }}" ] && missing="$missing DIST_CERT_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Secrets manquants :$missing — voir ios/README.md (section TestFlight)"
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer 2>/dev/null \
            || sudo xcode-select -s "$(ls -d /Applications/Xcode_16*.app | sort -V | tail -1)/Contents/Developer"
          xcodebuild -version

      - name: Install App Store Connect API key
        run: |
          mkdir -p ~/private_keys
          printf '%s' "${{ secrets.APPSTORE_P8 }}" > ~/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8

      - name: Import distribution certificate into a temporary keychain
        env:
          DIST_CERT_BASE64: ${{ secrets.DIST_CERT_BASE64 }}
          DIST_CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD=$(uuidgen)
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          echo "$DIST_CERT_BASE64" | base64 --decode > "$RUNNER_TEMP/dist.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/dist.p12" -k "$KEYCHAIN_PATH" \
            -P "$DIST_CERT_PASSWORD" -A -t cert -f pkcs12
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" > /dev/null
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          rm "$RUNNER_TEMP/dist.p12"

      - name: Archive (build number = run number)
        run: |
          xcodebuild archive \
            -project ios/Calendrier.xcodeproj \
            -scheme Calendrier \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/Calendrier.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8 \
            -authenticationKeyID "$APPSTORE_KEY_ID" \
            -authenticationKeyIssuerID "$APPSTORE_ISSUER_ID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER" \
            CODE_SIGN_STYLE=Automatic

      - name: Export and upload to App Store Connect
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>upload</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>uploadSymbols</key>
            <true/>
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Calendrier.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8 \
            -authenticationKeyID "$APPSTORE_KEY_ID" \
            -authenticationKeyIssuerID "$APPSTORE_ISSUER_ID"

      - name: Summary
        run: |
          echo "## 🚀 Build $GITHUB_RUN_NUMBER envoyé sur App Store Connect" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Le build apparaît dans TestFlight après le traitement Apple (5-30 min)." >> "$GITHUB_STEP_SUMMARY"
          echo "App Store Connect → TestFlight → iOS : ajoute-toi comme testeur interne si ce n'est pas déjà fait." >> "$GITHUB_STEP_SUMMARY"
